# 1. Specifies the Kubernetes API version for Deployments
apiVersion: apps/v1

# 2. Defines the type of object—a Deployment manages a set of identical Pods
kind: Deployment

# 3. The unique name for this deployment in your cluster
metadata:
  name: todo-app

# 4. The 'brain' of the deployment where you define the desired state
spec:
  # 5. Keeps 2 identical copies (Pods) running for high availability
  replicas: 2

  # 6. The 'filter' the controller uses to identify which Pods belong to it
  selector:
    matchLabels:
      app: todo-app

  # 7. The blueprint for the Pods that will be created
  template:
    metadata:
      # 8. The actual labels attached to the Pods (must match the selector above)
      labels:
        app: todo-app
    
    # 9. Specification for the container(s) living inside the Pod
    spec:
      containers:
      - name: todo-app
        # 10. The Docker image built by your Jenkins pipeline
        image: joshisk/todo-app:v1
        
        # 11. Forces the worker node to download the image every time a Pod starts
        imagePullPolicy: Always
        
        # 12. The port your application is listening on (matching your Dockerfile)
        ports:
        - containerPort: 8000

        # 13. Environment Variables: Injects configuration directly into your code
        env:
        - name: DB_NAME
          value: "tododb"        # The name of the database to use
        - name: DB_USER
          value: "todouser"      # The username for the database
        - name: DB_PASSWORD
          value: "todopassword"  # The password (Note: Use 'Secrets' for production!)
        - name: DB_HOST
          value: "postgres-service" # The internal DNS name of your Postgres service
        - name: DB_PORT
          value: "5432"          # The standard port for PostgreSQL
